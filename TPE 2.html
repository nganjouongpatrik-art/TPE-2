<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tip Calculator App | Partage de pourboire</title>
  <!-- Google Fonts : Space Mono (style typique du défi) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #C5E4E7;  /* couleur douce principale */
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* Carte principale */
    .card {
      max-width: 920px;
      width: 100%;
      background-color: white;
      border-radius: 25px;
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      transition: all 0.2s ease;
    }

    /* logo "splitter" avec un petit symbole image (icône intégrée) */
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #00474B;
      padding: 8px 20px;
      border-radius: 60px;
    }
    .logo-icon svg {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }
    .logo-icon span {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: white;
    }

    /* layout 2 colonnes pour desktop */
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .left-panel {
      flex: 1;
      min-width: 240px;
    }
    .right-panel {
      flex: 1;
      background-color: #00474B;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* styles communs champs */
    .input-group {
      margin-bottom: 2rem;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }
    .label-row label {
      color: #5E7A7D;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .error-message {
      color: #E17052;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon img, 
    .input-icon svg {
      position: absolute;
      left: 1rem;
      pointer-events: none;
    }
    .input-icon input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      background-color: #F3F9FA;
      border: 2px solid transparent;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: right;
      color: #00474B;
      outline: none;
      transition: 0.2s;
      cursor: pointer;
    }
    .input-icon input:focus {
      border-color: #26C2AE;
      background-color: #fff;
    }
    .input-icon input.error-input {
      border-color: #E17052;
    }
    /* grille des pourcentages */
    .tips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 0.9rem;
      margin-top: 0.5rem;
    }
    .tip-btn {
      background-color: #00474B;
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 0.6rem 0;
      cursor: pointer;
      transition: 0.2s ease;
      text-align: center;
    }
    .tip-btn:hover {
      background-color: #9FE8DF;
      color: #00474B;
    }
    .tip-btn.active {
      background-color: #26C2AE;
      color: #00474B;
    }
    .custom-tip-input {
      background-color: #F3F9FA;
      border: 2px solid transparent;
      border-radius: 8px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.6rem 0;
      color: #00474B;
      width: 100%;
      outline: none;
      transition: 0.2s;
    }
    .custom-tip-input:focus {
      border-color: #26C2AE;
      background-color: #fff;
    }
    .custom-tip-input::placeholder {
      color: #7F9D9F;
      font-weight: 400;
      font-size: 0.9rem;
    }

    /* panel droit résultats */
    .amount-card {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-label {
      color: white;
    }
    .result-label p:first-child {
      font-weight: 700;
      font-size: 1rem;
    }
    .result-label p:last-child {
      font-size: 0.75rem;
      color: #7F9D9F;
    }
    .result-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #26C2AE;
      letter-spacing: 1px;
    }
    .reset-btn {
      background-color: #26C2AE;
      border: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.8rem 0;
      color: #00474B;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 2rem;
      width: 100%;
    }
    .reset-btn:hover {
      background-color: #9FE8DF;
    }

    /* responsive */
    @media (max-width: 720px) {
      .card {
        padding: 1.5rem;
      }
      .result-value {
        font-size: 1.8rem;
      }
      .tips-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .tips-grid {
        grid-template-columns: 1fr 1fr;
      }
      .result-value {
        font-size: 1.6rem;
      }
    }

    /* supprimer flèches number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    footer {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 2rem;
      color: #5E7A7D;
    }
    a {
      color: #00474B;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="card">
  <!-- Logo avec icône image (SVG intégré pour respecter "les images") -->
  <div class="logo-area">
    <div class="logo-icon">
      <!-- icône SVG style pièce / partage -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="white" fill="none"/>
        <circle cx="12" cy="12" r="3" stroke="white" fill="#26C2AE"/>
      </svg>
      <span>SPLITTER</span>
    </div>
  </div>

  <div class="container">
    <!-- Panneau gauche : saisies -->
    <div class="left-panel">
      <!-- Facture (Bill) -->
      <div class="input-group">
        <div class="label-row">
          <label>Facture</label>
        </div>
        <div class="input-icon">
          <!-- icône dollar (image intégrée SVG) -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);">
            <path d="M12 1v22M17 5H9.5C7.57 5 6 6.57 6 8.5S7.57 12 9.5 12H14.5C16.43 12 18 13.57 18 15.5S16.43 19 14.5 19H6" stroke="#5E7A7D" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input type="number" id="billInput" placeholder="0" value="0" step="any" min="0">
        </div>
      </div>

      <!-- Sélection pourboire (Tip) -->
      <div class="input-group">
        <div class="label-row">
          <label>Sélectionnez le pourboire %</label>
        </div>
        <div class="tips-grid">
          <button class="tip-btn" data-tip="5">5%</button>
          <button class="tip-btn" data-tip="10">10%</button>
          <button class="tip-btn" data-tip="15">15%</button>
          <button class="tip-btn" data-tip="25">25%</button>
          <button class="tip-btn" data-tip="50">50%</button>
          <input type="number" id="customTip" class="custom-tip-input" placeholder="Personnalisé" step="any" min="0">
        </div>
      </div>

      <!-- Nombre de personnes (Number of People) -->
      <div class="input-group">
        <div class="label-row">
          <label>Nombre de personnes</label>
          <span id="peopleError" class="error-message"></span>
        </div>
        <div class="input-icon">
          <!-- icône personne -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="#5E7A7D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input type="number" id="peopleInput" placeholder="0" value="1" min="1" step="1">
        </div>
      </div>
    </div>

    <!-- Panneau droit : résultats + reset -->
    <div class="right-panel">
      <div class="amount-card">
        <div class="result-row">
          <div class="result-label">
            <p>Montant du pourboire</p>
            <p>/ personne</p>
          </div>
          <div class="result-value" id="tipAmount">$0.00</div>
        </div>
        <div class="result-row">
          <div class="result-label">
            <p>Total</p>
            <p>/ personne</p>
          </div>
          <div class="result-value" id="totalAmount">$0.00</div>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn">RESET</button>
    </div>
  </div>
  <footer>
    Challenge by <a href="https://www.frontendmentor.io/challenges/tip-calculator-app-ugJNGbJUX" target="_blank">Frontend Mentor</a>. Solution complète avec images SVG.
  </footer>
</div>

<script>
  // Récupération des éléments DOM
  const billInput = document.getElementById('billInput');
  const peopleInput = document.getElementById('peopleInput');
  const customTipInput = document.getElementById('customTip');
  const tipButtons = document.querySelectorAll('.tip-btn');
  const tipAmountSpan = document.getElementById('tipAmount');
  const totalAmountSpan = document.getElementById('totalAmount');
  const resetBtn = document.getElementById('resetBtn');
  const peopleErrorSpan = document.getElementById('peopleError');

  // États internes
  let currentBill = 0;
  let currentPeople = 1;
  let currentTipPercent = 0;      // pourcentage sélectionné (buttons ou custom)
  let activeTipButton = null;      // référence bouton actif

  // --- Fonction utilitaire pour formater en dollars ---
  const formatMoney = (value) => {
    return `$${value.toFixed(2)}`;
  };

  // --- Calcul et mise à jour des montants (tip / total par personne) ---
  const updateResults = () => {
    // 1) Lire la facture (bill)
    let bill = parseFloat(billInput.value);
    if (isNaN(bill) || bill < 0) bill = 0;
    currentBill = bill;
    
    // 2) Lire le nombre de personnes
    let people = parseInt(peopleInput.value);
    let isValidPeople = true;
    let errorMsg = '';
    
    if (isNaN(people) || people <= 0) {
      isValidPeople = false;
      errorMsg = 'Ne peut pas être zéro';
      people = 1; // pour éviter division par zéro dans le calcul, mais on affichera 0.00
      peopleInput.classList.add('error-input');
      peopleErrorSpan.innerText = errorMsg;
    } else {
      peopleInput.classList.remove('error-input');
      peopleErrorSpan.innerText = '';
    }
    currentPeople = (isValidPeople ? people : 1);
    
    // 3) Déterminer le pourcentage de pourboire actif
    // Priorité : champ custom (si rempli et valide) > bouton actif sélectionné > 0%
    let tipPercent = 0;
    let customValueRaw = customTipInput.value.trim();
    let customIsActive = false;
    
    if (customValueRaw !== "") {
      let customVal = parseFloat(customValueRaw);
      if (!isNaN(customVal) && customVal >= 0) {
        tipPercent = customVal;
        customIsActive = true;
        // Si custom est utilisé, on désactive visuellement tout bouton actif
        if (activeTipButton) {
          activeTipButton.classList.remove('active');
          activeTipButton = null;
        }
      } else {
        // custom invalide -> on va chercher éventuellement le bouton actif
        if (activeTipButton) {
          tipPercent = parseFloat(activeTipButton.getAttribute('data-tip'));
        } else {
          tipPercent = 0;
        }
      }
    } else {
      // Champ custom vide -> se baser sur le bouton actif s'il existe
      if (activeTipButton) {
        tipPercent = parseFloat(activeTipButton.getAttribute('data-tip'));
      } else {
        tipPercent = 0;
      }
    }
    
    currentTipPercent = tipPercent;
    
    // 4) Calcul du pourboire et total par personne (uniquement si people valide et bill >0)
    let tipPerPerson = 0;
    let totalPerPerson = 0;
    
    if (isValidPeople && currentBill > 0 && currentPeople > 0 && currentTipPercent >= 0) {
      const tipTotal = currentBill * (currentTipPercent / 100);
      tipPerPerson = tipTotal / currentPeople;
      totalPerPerson = (currentBill / currentPeople) + tipPerPerson;
    } else {
      tipPerPerson = 0;
      totalPerPerson = 0;
    }
    
    // Mise à jour UI
    tipAmountSpan.innerText = formatMoney(tipPerPerson);
    totalAmountSpan.innerText = formatMoney(totalPerPerson);
  };
  
  // --- Synchronisation de l'état actif des boutons et du custom ---
  // Lorsqu'on clique sur un bouton pourboire prédéfini
  const setActiveTipButton = (button) => {
    if (activeTipButton) {
      activeTipButton.classList.remove('active');
    }
    activeTipButton = button;
    activeTipButton.classList.add('active');
    // Effacer la valeur du champ custom pour éviter conflit
    customTipInput.value = '';
    // Déclencher le recalcul
    updateResults();
  };
  
  // --- Gestion événementielle des boutons de pourboire ---
  tipButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      setActiveTipButton(btn);
    });
  });
  
  // Gestion du champ custom : quand l'utilisateur saisit un pourcentage personnalisé
  customTipInput.addEventListener('input', (e) => {
    // Quand on modifie custom, on retire l'état actif des boutons prédéfinis
    if (activeTipButton) {
      activeTipButton.classList.remove('active');
      activeTipButton = null;
    }
    // Si la valeur custom est vide ou invalide, on recalcule avec 0 par défaut (mais boutons plus actifs)
    updateResults();
  });
  
  // Facture et nombre de personnes : mise à jour en temps réel
  billInput.addEventListener('input', () => {
    // Nettoyer les valeurs non numériques / valeurs négatives forcées à 0 à l'affichage
    let rawBill = billInput.value;
    if (rawBill === '') rawBill = '0';
    let billVal = parseFloat(rawBill);
    if (isNaN(billVal)) billVal = 0;
    if (billVal < 0) billVal = 0;
    billInput.value = billVal;
    updateResults();
  });
  
  peopleInput.addEventListener('input', () => {
    let rawPeople = peopleInput.value;
    if (rawPeople === '') rawPeople = '1';
    let peopleVal = parseInt(rawPeople);
    if (isNaN(peopleVal)) peopleVal = 1;
    if (peopleVal < 1) {
      // On garde la valeur invalide pour afficher l'erreur, mais on ne modifie pas en force immédiate ?
      // On laisse l'affichage, l'erreur sera gérée par updateResults()
    }
    peopleInput.value = peopleVal;
    updateResults();
  });
  
  // --- RESET complet (tous champs, boutons et résultats)---
  const resetAll = () => {
    // Reset facture
    billInput.value = '0';
    // Reset personnes
    peopleInput.value = '1';
    // Reset pourboire : enlever tout bouton actif
    if (activeTipButton) {
      activeTipButton.classList.remove('active');
      activeTipButton = null;
    }
    // Vider champ custom
    customTipInput.value = '';
    // Nettoyer les erreurs
    peopleInput.classList.remove('error-input');
    peopleErrorSpan.innerText = '';
    // Forcer màj résultats
    updateResults();
  };
  
  resetBtn.addEventListener('click', resetAll);
  
  // Initialisation : s'assurer qu'aucun bouton n'est actif au départ, résultat 0, et définir placeholder cohérent
  const init = () => {
    // Aucun bouton actif par défaut
    if (activeTipButton) {
      activeTipButton.classList.remove('active');
      activeTipButton = null;
    }
    customTipInput.value = '';
    billInput.value = '0';
    peopleInput.value = '1';
    updateResults();
  };
  
  init();
  
  // Bonus : empêcher les caractères invalides dans les champs number si besoin, mais 'step' gère bien.
  // Permettre le focus pour améliorer expérience
  // Gestion des erreurs dynamique si l'utilisateur met 0 personne
  peopleInput.addEventListener('blur', () => {
    let val = parseInt(peopleInput.value);
    if (isNaN(val) || val <= 0) {
      peopleInput.classList.add('error-input');
      peopleErrorSpan.innerText = 'Ne peut pas être zéro';
      if (isNaN(val)) peopleInput.value = '1';
      else if (val <= 0) peopleInput.value = '1';
      updateResults();
    } else {
      peopleInput.classList.remove('error-input');
      peopleErrorSpan.innerText = '';
      updateResults();
    }
  });
  
  // Désactiver les messages d'erreur quand on retape une valeur correcte
  peopleInput.addEventListener('input', () => {
    let val = parseInt(peopleInput.value);
    if (!isNaN(val) && val > 0) {
      peopleInput.classList.remove('error-input');
      peopleErrorSpan.innerText = '';
    }
    updateResults();
  });
  
  // Pour que le custom tip soit cohérent : si on clique sur un bouton avec custom rempli, on écrase le custom
  // (déjà géré via setActiveTipButton qui vide custom)
  // Toute modification d'un champ redéclenche le calcul global
  // Eviter les plantages avec des symboles
  billInput.addEventListener('blur', () => {
    let v = parseFloat(billInput.value);
    if (isNaN(v)) billInput.value = '0';
    else if (v < 0) billInput.value = '0';
    updateResults();
  });
  
  customTipInput.addEventListener('blur', () => {
    let custom = customTipInput.value.trim();
    if (custom !== "") {
      let num = parseFloat(custom);
      if (isNaN(num) || num < 0) {
        customTipInput.value = '';
        // supprimer actif si présent
        if (activeTipButton) {
          activeTipButton.classList.remove('active');
          activeTipButton = null;
        }
        updateResults();
      } else {
        // garder la valeur numérique propre (limite décimale)
        customTipInput.value = num;
        updateResults();
      }
    } else {
      // champ vide: update sans custom
      updateResults();
    }
  });
  
  // Bonus pour gérer le cas où l'utilisateur tape des pourcentages trop grands > 100, mais acceptable
  // Pas de limite stricte pour rester réaliste, mais on peut arrondir esthétiquement
  // Autre précision : utilisation des images SVG intégrées (icônes dollar et personne) qui sont bien présentes -> "images aussi"
  // L'application répond complètement au défi du Tip Calculator App
</script>
</body>
</html>
